<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="visioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3955A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A7DE1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="4" y="4" width="88" height="88" rx="8" ry="8" fill="url(#visioGradient)"/>
  <!-- Diagram shapes -->
  <rect x="20" y="20" width="24" height="16" rx="3" ry="3" fill="white" opacity="0.9"/>
  <rect x="52" y="20" width="24" height="16" rx="3" ry="3" fill="white" opacity="0.9"/>
  <rect x="36" y="50" width="24" height="16" rx="3" ry="3" fill="white" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="32" y1="36" x2="48" y2="50" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="64" y1="36" x2="48" y2="50" stroke="white" stroke-width="2" opacity="0.7"/>
  <!-- V letter -->
  <text x="48" y="82" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">V</text>
</svg>
