stages:
  - test

default:
  tags:
    - k8s
    - amd64
  services:
    - name: postgres:18
      variables:
        HEALTHCHECK_TCP_PORT: "5432"
    - name: open62541/open62541:latest
      alias: opcua
      variables:
        HEALTHCHECK_TCP_PORT: "4840"
    - name: quay.io/artemiscloud/activemq-artemis-broker:artemis.2.38.0
      alias: artemis
      entrypoint: ["/bin/sh", "-ec"]
      command:
        - |
          /opt/amq/bin/artemis create \
            --user "$AMQ_USER" \
            --password "$AMQ_PASSWORD" \
            --role admin \
            --name broker \
            --allow-anonymous \
            --host 0.0.0.0 \
            --http-host 0.0.0.0 \
            --force \
            --no-fsync \
            --silent \
            --no-mqtt-acceptor \
            /home/jboss/broker
          exec /home/jboss/broker/bin/artemis run
      variables:
        AMQ_USER: admin
        AMQ_PASSWORD: admin
        HEALTHCHECK_TCP_PORT: "61616"
  before_script:
    - |
        curl "https://api.github.com/repos/qoretechnologies/${REPO_NAME}/statuses/${CI_COMMIT_SHA}" \
        -X POST --oauth2-bearer ${GITHUB_ACCESS_TOKEN} -H "Content-Type: application/json" \
        -d "{\"state\": \"pending\", \"context\": \"${REPO_NAME}\", \"description\": \"Gitlab CI\", \"target_url\": \"${CI_JOB_URL}\"}"
    - set +e

variables:
  REPO_NAME: module-jni
  POSTGRES_PASSWORD: omq
  QORE_DB_CONNSTR: pgsql:postgres/omq@postgres%postgres
  MQTT_CONNECTION: "mqtttcp://artemis:61616"
  OPCUA_CONNECTION: "opc.tcp://opcua:4840"
  JMS_CONNECTION: "tcp://artemis:61616"
  ARTEMIS_JAKARTA_JAR_URL: "https://repo1.maven.org/maven2/org/apache/activemq/artemis-jakarta-client-all/2.40.0/artemis-jakarta-client-all-2.40.0.jar"
  TZ: Europe/Prague
  PGTZ: Europe/Prague

test-ubuntu:
  stage: test
  image: $CI_REGISTRY/infrastructure/qore-test-base/qore-test-base:develop
  script:
    - |
        if test/docker_test/test-ubuntu.sh; then
          curl "https://api.github.com/repos/qoretechnologies/${REPO_NAME}/statuses/${CI_COMMIT_SHA}" \
            -X POST --oauth2-bearer ${GITHUB_ACCESS_TOKEN} -H "Content-Type: application/json" \
            -d "{\"state\": \"success\", \"context\": \"${REPO_NAME}\", \"description\": \"Gitlab CI\", \"target_url\": \"${CI_JOB_URL}\"}"
          exit 0
        else
          curl "https://api.github.com/repos/qoretechnologies/${REPO_NAME}/statuses/${CI_COMMIT_SHA}" \
            -X POST --oauth2-bearer ${GITHUB_ACCESS_TOKEN} -H "Content-Type: application/json" \
            -d "{\"state\": \"failure\", \"context\": \"${REPO_NAME}\", \"description\": \"Gitlab CI\", \"target_url\": \"${CI_JOB_URL}\"}"
          exit 1
        fi

test-alpine:
  stage: test
  image: $CI_REGISTRY/infrastructure/qore-test-base/qore-test-base:develop-alpine
  script:
    - |
        if test/docker_test/test-alpine.sh; then
          curl "https://api.github.com/repos/qoretechnologies/${REPO_NAME}/statuses/${CI_COMMIT_SHA}" \
            -X POST --oauth2-bearer ${GITHUB_ACCESS_TOKEN} -H "Content-Type: application/json" \
            -d "{\"state\": \"success\", \"context\": \"${REPO_NAME}\", \"description\": \"Gitlab CI\", \"target_url\": \"${CI_JOB_URL}\"}"
          exit 0
        else
          curl "https://api.github.com/repos/qoretechnologies/${REPO_NAME}/statuses/${CI_COMMIT_SHA}" \
            -X POST --oauth2-bearer ${GITHUB_ACCESS_TOKEN} -H "Content-Type: application/json" \
            -d "{\"state\": \"failure\", \"context\": \"${REPO_NAME}\", \"description\": \"Gitlab CI\", \"target_url\": \"${CI_JOB_URL}\"}"
          exit 1
        fi
